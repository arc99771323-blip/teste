<html lang="pt-BR">

    <title>Consulta de Produtos Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --container-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #4361ee;
            --border-color: rgba(0,0,0,0.1);
            --input-bg: #ffffff;
            --success: #2ecc71;
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #1a1a2e, #16213e);
            --container-bg: rgba(26, 26, 46, 0.98);
            --card-bg: #242442;
            --text-main: #e0e0e0;
            --border-color: rgba(255,255,255,0.1);
            --input-bg: #2b2b45;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 30px 15px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 650px; width: 100%;
            background: var(--container-bg);
            padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 5px; }
        .subtitulo { text-align: center; margin-bottom: 20px; font-size: 11px; opacity: 0.6; letter-spacing: 1px; }

        #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; border: 2px solid var(--primary) !important; }

        .controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn-action { padding: 8px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(67, 97, 238, 0.1); color: var(--primary); transition: 0.2s; }
        .btn-action:hover { background: var(--primary); color: white; }

        .search-wrapper { position: relative; display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box { flex: 1; position: relative; }
        .search-box input { width: 100%; padding: 14px 45px 14px 18px; border-radius: 12px; border: 1.5px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 15px; outline: none; box-sizing: border-box; }

        .btn-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #999; cursor: pointer; font-size: 18px; display: none; }
        .btn-camera { background: var(--primary); color: white; border: none; width: 55px; border-radius: 12px; cursor: pointer; font-size: 18px; transition: 0.3s; }

        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--card-bg); border-radius: 12px; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 100; display: none; max-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); }
        .suggestion-item { padding: 12px 18px; cursor: pointer; border-bottom: 1px solid var(--border-color); transition: 0.2s; }
        .suggestion-item:hover { background: rgba(67, 97, 238, 0.1); }

        .card-produto { border-radius: 16px; background: var(--card-bg); border: 1px solid var(--border-color); overflow: hidden; animation: fadeIn 0.3s ease; margin-bottom: 20px; }
        .card-header { background: var(--primary); color: white; padding: 15px 20px; font-weight: 600; }
        .card-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--border-color); }
        .campo { background: var(--card-bg); padding: 14px 18px; display: flex; flex-direction: column; }
        .campo span { font-size: 9px; text-transform: uppercase; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
        .campo strong { font-size: 13px; }

        /* Estilos da Lista de Itens */
        .lista-conferencia { width: 100%; background: var(--container-bg); border-radius: 20px; padding: 20px; box-sizing: border-box; border: 1px solid var(--border-color); }
        .lista-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--primary); color: var(--primary); }
        td { padding: 10px; border-bottom: 1px solid var(--border-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 500px) { .card-body { grid-template-columns: 1fr; } }
    </style>
</head>

<div class="container">

</div>

</div>

    let filtroCDD = false;
    let html5QrCode;
    let debounceTimer;
    let listaEscaneados = []; // Lista para o PDF e Tabela
    
    const inputBusca = document.getElementById('busca');
    const btnClear = document.getElementById('btnClear');
    const sugestoesDiv = document.getElementById('sugestoes');
    const scanBtn = document.getElementById('scanBtn');

    inputBusca.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const termo = inputBusca.value.trim().toLowerCase();
        btnClear.style.display = termo ? 'block' : 'none';
        if (!termo) { sugestoesDiv.style.display = 'none'; return; }
        debounceTimer = setTimeout(() => { renderizarSugestoes(termo); }, 300);
    });

    function renderizarSugestoes(termo) {
        let filtrados = produtos.filter(p => 
            String(p.codigo).toLowerCase().includes(termo) || 
            p.descricao.toLowerCase().includes(termo) ||
            (p.codEAN && String(p.codEAN).includes(termo))
        );
        if (filtroCDD) filtrados = filtrados.filter(p => p["Portifolio CDD"] === "SIM");
        sugestoesDiv.innerHTML = '';
        if (filtrados.length > 0) {
            sugestoesDiv.style.display = 'block';
            filtrados.forEach(p => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${p.codigo}</strong> - ${p.descricao}`;
                div.onclick = () => { exibirProduto(p); sugestoesDiv.style.display = 'none'; };
                sugestoesDiv.appendChild(div);
            });
        } else { sugestoesDiv.style.display = 'none'; }
    }

    function exibirProduto(p) {
        inputBusca.value = p.descricao;
        document.getElementById('resultado').innerHTML = `
            <div class="card-produto">
                <div class="card-header">CÓDIGO: ${p.codigo}</div>
                <div class="card-body">
                    <div class="campo" style="grid-column: span 2"><span>Descrição Completa</span><strong>${p.descricao}</strong></div>
                    <div class="campo"><span>Código EAN</span><strong>${p.codEAN || 'N/A'}</strong></div>
                    <div class="campo"><span>Embalagem</span><strong>${p.embalagem}</strong></div>
                    <div class="campo"><span>Fator</span><strong>${p.fator}</strong></div>
                    <div class="campo"><span>Lastro / Total Pallet</span><strong>${p.lastro} / ${p.caixas_pallet} cx</strong></div>
                </div>
            </div>
        `;
        adicionarNaLista(p); // Chamada da nova função
    }

    // --- LOGICA DE ACUMULAÇÃO ---
    function adicionarNaLista(produto) {
        const itemExistente = listaEscaneados.find(item => item.codigo === produto.codigo);
        
        if (itemExistente) {
            itemExistente.quantidade += 1;
        } else {
            listaEscaneados.push({
                codigo: produto.codigo,
                descricao: produto.descricao,
                quantidade: 1
            });
        }
        atualizarTabelaVisual();
    }

    function atualizarTabelaVisual() {
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        listaEscaneados.forEach(item => {
            const row = `<tr>
                <td>${item.codigo}</td>
                <td>${item.descricao}</td>
                <td style="text-align: center; font-weight: bold;">${item.quantidade}</td>
            </tr>`;
            corpo.innerHTML += row;
        });
    }

    // --- EXPORTAR PDF ---
    function exportarPDF() {
        if (listaEscaneados.length === 0) {
            alert("A lista está vazia!");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR');
        const horaFormatada = agora.toLocaleTimeString('pt-BR');

        // Cabeçalho PDF
        doc.setFontSize(18);
        doc.text("B.o de quebra", 14, 20);
        doc.setFontSize(10);
        doc.text(`Data: ${dataFormatada} - Hora: ${horaFormatada}`, 14, 28);

        // Gerar Tabela no PDF
        const colunas = ["Código", "Produto", "Quantidade"];
        const linhas = listaEscaneados.map(item => [item.codigo, item.descricao, item.quantidade]);

        doc.autoTable({
            startY: 35,
            head: [colunas],
            body: linhas,
            theme: 'grid',
            headStyles: { fillColor: [67, 97, 238] }
        });

        doc.save(`BO_QUEBRA_${dataFormatada.replace(/\//g, '-')}.pdf`);
    }

    // --- RESTANTE DO CÓDIGO ORIGINAL (SEM ALTERAÇÕES) ---
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-box')) { sugestoesDiv.style.display = 'none'; } });

    scanBtn.onclick = () => {
        const reader = document.getElementById('reader');
        if (reader.style.display === 'block') { stopScan(); } 
        else { startScan(); }
    };

    function startScan() {
        document.getElementById('reader').style.display = 'block';
        scanBtn.innerHTML = '<i class="fas fa-times"></i>';
        scanBtn.style.background = '#e74c3c';
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 280, height: 150 }, aspectRatio: 1.777778 };
        html5QrCode.start({ facingMode: "environment" }, config, (text) => {
            const p = produtos.find(item => String(item.codEAN) === text || String(item.codigo) === text);
            if(p) { exibirProduto(p); stopScan(); } 
            else { alert("Produto não encontrado: " + text); }
        }).catch(err => { stopScan(); });
    }

    function stopScan() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                scanBtn.innerHTML = '<i class="fas fa-camera"></i>';
                scanBtn.style.background = 'var(--primary)';
            }).catch(() => { document.getElementById('reader').style.display = 'none'; });
        }
    }

    btnClear.onclick = () => {
        inputBusca.value = ''; btnClear.style.display = 'none';
        sugestoesDiv.style.display = 'none'; document.getElementById('resultado').innerHTML = '';
        inputBusca.focus();
    };

    function toggleTheme() { document.body.classList.toggle('dark'); }
    function alternarFiltro() {
        filtroCDD = !filtroCDD;
        document.getElementById('filterBtn').innerText = `Filtro: ${filtroCDD ? 'CDD' : 'Todos'}`;
    }
</script>

</body>
</html>
